<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Games</title>
</head>
<body>
    <h3>Enter start dates, end dates and team names to find the respective data (summer league data is not included)</h3>
    <form method = "GET">
        <div>
            <label>Start Date: </label>
            <input type="date" name="start_date" id="start_date" value= "{{ request.GET.start_date }}" required>
        </div>
        <div>
            <label>End Date: </label>
            <input type="date" name="end_date" id="end_date" value= "{{ request.GET.end_date }}" required>
        </div>
        <div>
            <label>Team Name: </label>
            <input type="text" name="team_name" id="team_name" value= "{{ request.GET.team_name }}" required>
        </div>
        
    </form>
</body>
</html>
